<!DOCTYPE html>
<html lang="en">
<head>

  <title>Project Dashboard</title>
  <link rel="stylesheet" href="assets/css/dashboard.css?v=1775360219">
  <script>
    // Apply theme before first paint to avoid flash
    (function(){
      var saved = localStorage.getItem('theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>

      <button class="nav-btn" data-tab="trends">

    <div id="tab-trends" class="tab-panel">

    </div>

    <div id="tab-builds" class="tab-panel">
      <section id="builds-view"></section>

    <!-- CI tab panels are created dynamically by registerCISection() -->

    <div id="tab-op-coverage" class="tab-panel">

    </div>

  <footer>
    <p>Data collected via <a href="https://github.com/AndreasKaratzas/vllm-internal-project-dashboard">project-dashboard</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@dagrejs/dagre@1/dist/dagre.min.js"></script>
  <script src="assets/js/utils.js?v=1775360219"></script>
  <script src="assets/js/ci-health.js?v=1775360219"></script>
  <script src="assets/js/ci-analytics.js?v=1775360219"></script>
  <script src="assets/js/ci-queue.js?v=1775360219"></script>
  <script src="assets/js/op-coverage.js?v=1775360219"></script>
  <script src="assets/js/op-perf.js?v=1775360219"></script>
  <script src="assets/js/dashboard.js?v=1775360219"></script>
  <script>
    (function(){
      var btn = document.getElementById('theme-toggle');
      function updateIcon() {
        btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
      }
      updateIcon();
      btn.onclick = function() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        localStorage.setItem('theme', next);
        // Reload to re-compute all JS color constants from the new CSS variables.
        // The theme is applied from localStorage before first paint (in <head>),
        // so there's no flash.
        location.reload();
      };
      // Listen for system preference changes (only if no manual override)
      window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) {
          var theme = e.matches ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          updateIcon();
        }
      });
    })();
  </script>
</body>
</html>
