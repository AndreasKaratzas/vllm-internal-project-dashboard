name: Secrets scan

# Blocks PRs and pushes that introduce real-looking tokens (GitHub PATs,
# Buildkite API tokens, HuggingFace tokens, long hash-like hex strings).
# Placeholders such as ``ghp_...`` are fine — the scanner's length guards
# are tuned not to trip on them. See ``scripts/vllm/secrets_scan.py``
# for the exact patterns and allowlist.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run secrets scan
        run: python scripts/vllm/secrets_scan.py
