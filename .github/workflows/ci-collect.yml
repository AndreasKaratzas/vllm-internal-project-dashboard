name: CI Data Collection

# Runs daily at 7 AM CT, then re-checks every 3 hours to pick up
# completed jobs from builds that were still running.
# Also triggered by Buildkite webhook via repository_dispatch
# or manually via workflow_dispatch.
on:
  repository_dispatch:
    types: [buildkite_build_finished]
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of history to fetch'
        required: false
        default: '1'
      pipeline:
        description: 'Pipeline to collect (amd/upstream/both)'
        required: false
        default: 'both'

concurrency:
  # Shares the same lock as every workflow that publishes to gh-pages so
  # queue, CI, manual, and preview deploys never overlap on the branch.
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Collect CI data
        run: |
          # Default to 1 day for scheduled/webhook runs; manual dispatch can override
          DAYS="${{ github.event.inputs.days || '1' }}"
          PIPELINE="${{ github.event.inputs.pipeline || 'both' }}"
          python scripts/collect_ci.py --days "$DAYS" --pipeline "$PIPELINE" --output data/vllm/ci/
        env:
          BUILDKITE_TOKEN: ${{ secrets.BUILDKITE_TOKEN }}

      - name: Collect CI analytics
        run: python scripts/vllm/collect_analytics.py --days 14 --output data/vllm/ci/
        env:
          BUILDKITE_TOKEN: ${{ secrets.BUILDKITE_TOKEN }}

      - name: Collect test group changes
        run: python scripts/vllm/collect_group_changes.py --days 30 --output data/vllm/ci/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect AMD test matrix
        run: python scripts/vllm/collect_amd_test_matrix.py --output data/vllm/ci/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vllm/ci/ data/vllm/test_results.json data/vllm/parity_report.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update vLLM CI data $(date -u +%Y-%m-%d)"
            # Push to main is best-effort — branch protection may block it.
            # The deploy to gh-pages below ensures data is always published.
            if git pull --rebase origin main; then
              git push || echo "::warning::Push to main failed (branch protection). Data will be deployed to gh-pages directly."
            else
              git rebase --abort || true
              echo "::warning::Rebase against origin/main failed; deploying from the pre-rebase tree instead."
            fi
          fi

      - name: Assemble site
        run: python scripts/build_site.py --cache-bust-index

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: true
