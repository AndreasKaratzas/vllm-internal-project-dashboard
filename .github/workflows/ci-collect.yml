name: CI Data Collection

# Runs daily at 7 AM CT (1 PM UTC / 12 PM UTC during CDT)
# Also triggered by Buildkite webhook via repository_dispatch
# or manually via workflow_dispatch
on:
  schedule:
    - cron: '0 13 * * *'  # 7 AM CT (CDT=UTC-5 -> 12 UTC, CST=UTC-6 -> 13 UTC)
  repository_dispatch:
    types: [buildkite_build_finished]
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of history to fetch'
        required: false
        default: '1'
      pipeline:
        description: 'Pipeline to collect (amd/upstream/both)'
        required: false
        default: 'both'

concurrency:
  group: ci-collect
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Collect CI data
        run: |
          # Default to 1 day for scheduled/webhook runs; manual dispatch can override
          DAYS="${{ github.event.inputs.days || '1' }}"
          PIPELINE="${{ github.event.inputs.pipeline || 'both' }}"
          python scripts/collect_ci.py --days "$DAYS" --pipeline "$PIPELINE" --output data/vllm/ci/
        env:
          BUILDKITE_TOKEN: ${{ secrets.BUILDKITE_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vllm/ci/
          git diff --staged --quiet || git commit -m "ci: update vLLM CI data $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Re-checkout for deploy
        run: git checkout .

      - name: Assemble site
        run: |
          rm -rf _site && mkdir -p _site
          cp -r docs/* _site/
          rm -rf _site && mkdir -p _site/data && cp -r data/* _site/data/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: true
