name: Deploy to GitHub Pages

on:
  workflow_dispatch:  # Manual trigger only; daily deploys handled by daily-update.yml

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Sync queue data from gh-pages
        run: |
          # Queue monitor may have pushed data directly to gh-pages that
          # didn't make it to main (branch protection). Pull the latest.
          git fetch origin gh-pages --depth=1 || true
          LIVE_FILE=$(git show origin/gh-pages:data/vllm/ci/queue_timeseries.jsonl 2>/dev/null || true)
          if [ -n "$LIVE_FILE" ]; then
            LIVE_LINES=$(echo "$LIVE_FILE" | wc -l)
            LOCAL_LINES=$(wc -l < data/vllm/ci/queue_timeseries.jsonl)
            if [ "$LIVE_LINES" -gt "$LOCAL_LINES" ]; then
              echo "Using gh-pages queue data ($LIVE_LINES lines vs $LOCAL_LINES on main)"
              echo "$LIVE_FILE" > data/vllm/ci/queue_timeseries.jsonl
            fi
          fi

      - name: Render site data
        run: python scripts/render.py

      - name: Assemble site
        run: |
          rm -rf _site && mkdir -p _site
          cp -r docs/* _site/
          mkdir -p _site/data && cp -r data/* _site/data/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: true
