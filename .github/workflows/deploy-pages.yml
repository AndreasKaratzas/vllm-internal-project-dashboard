name: Deploy to GitHub Pages

on:
  workflow_dispatch:  # Manual trigger only; daily deploys handled by daily-update.yml

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Sync live data from gh-pages
        run: |
          # gh-pages has the latest CI + queue data (ci-collect and queue-monitor
          # push there directly since branch protection blocks pushes to main).
          git fetch origin gh-pages --depth=1 || true
          # Sync queue timeseries (append-only, take the longer file)
          LIVE_FILE=$(git show origin/gh-pages:data/vllm/ci/queue_timeseries.jsonl 2>/dev/null || true)
          if [ -n "$LIVE_FILE" ]; then
            LIVE_LINES=$(echo "$LIVE_FILE" | wc -l)
            LOCAL_LINES=$(wc -l < data/vllm/ci/queue_timeseries.jsonl)
            if [ "$LIVE_LINES" -gt "$LOCAL_LINES" ]; then
              echo "Using gh-pages queue data ($LIVE_LINES lines vs $LOCAL_LINES on main)"
              echo "$LIVE_FILE" > data/vllm/ci/queue_timeseries.jsonl
            fi
          fi
          # Sync CI analysis JSON files
          for f in ci_health.json parity_report.json config_parity.json flaky_tests.json failure_trends.json quarantine.json analytics.json; do
            LIVE=$(git show origin/gh-pages:data/vllm/ci/$f 2>/dev/null || true)
            if [ -n "$LIVE" ]; then
              echo "$LIVE" > data/vllm/ci/$f
              echo "Synced $f from gh-pages"
            fi
          done

      - name: Render site data
        run: python scripts/render.py

      - name: Assemble site
        run: |
          rm -rf _site && mkdir -p _site
          cp -r docs/* _site/
          mkdir -p _site/data && cp -r data/* _site/data/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: true
