name: Queue Monitor (Hourly)

on:
  schedule:
    - cron: '15 * * * *'  # Every hour at :15
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Collect queue snapshot
        env:
          BUILDKITE_TOKEN: ${{ secrets.BUILDKITE_TOKEN }}
        run: python scripts/vllm/collect_queue_snapshot.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vllm/ci/queue_timeseries.jsonl
          git diff --staged --quiet || git commit -m "queue snapshot $(date -u +%Y-%m-%dT%H:%M)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
