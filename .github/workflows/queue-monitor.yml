name: Queue Monitor (Hourly)

on:
  schedule:
    - cron: '15 * * * *'  # Every hour at :15
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Collect queue snapshot
        env:
          BUILDKITE_TOKEN: ${{ secrets.BUILDKITE_TOKEN }}
        run: python scripts/vllm/collect_queue_snapshot.py

      - name: Copy to docs
        run: |
          mkdir -p docs/data/vllm/ci
          cp data/vllm/ci/queue_timeseries.jsonl docs/data/vllm/ci/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vllm/ci/queue_timeseries.jsonl docs/data/vllm/ci/queue_timeseries.jsonl
          git diff --staged --quiet || git commit -m "queue snapshot $(date -u +%Y-%m-%dT%H:%M)"
          git push
