name: Queue Monitor (Hourly)

on:
  schedule:
    - cron: '15 * * * *'  # Every hour at :15
  workflow_dispatch:       # Manual trigger

concurrency:
  group: queue-monitor
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Collect queue snapshot
        env:
          BUILDKITE_TOKEN: ${{ secrets.BUILDKITE_TOKEN }}
        run: |
          echo "Before: $(wc -l < data/vllm/ci/queue_timeseries.jsonl) lines"
          python scripts/vllm/collect_queue_snapshot.py
          echo "After: $(wc -l < data/vllm/ci/queue_timeseries.jsonl) lines"
          tail -1 data/vllm/ci/queue_timeseries.jsonl | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Latest: ts={d[\"ts\"]}, queues={len(d[\"queues\"])}')"

      - name: Commit and push
        run: |
          echo "Lines in file: $(wc -l < data/vllm/ci/queue_timeseries.jsonl)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vllm/ci/queue_timeseries.jsonl
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "queue snapshot $(date -u +%Y-%m-%dT%H:%M)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed, retrying in 5s..."
              sleep 5
            done
          fi

      - name: Assemble site
        run: |
          rm -rf _site && mkdir -p _site
          cp -r docs/* _site/
          mkdir -p _site/data && cp -r data/* _site/data/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: true
