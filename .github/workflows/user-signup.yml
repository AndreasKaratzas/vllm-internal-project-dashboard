name: Process user signup

# Triggered when a dashboard visitor opens a "signup: <login>" issue via the
# entry-gate on docs/index.html. The issue body is an audit record carrying
# {email, requested_at}. Identity (github_id + login) is pulled from
# github.event.issue.user — authoritative and unspoofable.
#
# Responsibilities:
#   * ``signup-request`` → validate + mark the issue as pending approval.
#   * ``signup-approved`` → only the dashboard admin may trigger the
#     allowlist write to ``data/users.json``.
#   * ``signup-rejected`` → only the dashboard admin may reject a request.
# The issue is intentionally NOT auto-closed — the admin keeps it open as
# an audit record and closes it manually.
#
# Trigger: ``labeled`` only. Creating an issue with a label fires both
# ``opened`` and ``labeled`` (GitHub delivers both for each label), which
# previously ran this handler twice per signup. Narrowing to ``labeled``
# plus filtering on the relevant signup labels gives exactly one run for
# each state transition. The ``signup-processed`` guard prevents accidental
# replay after a request has already reached a terminal state.
on:
  issues:
    types: [labeled]

concurrency:
  group: user-signup-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: write

jobs:
  process:
    if: >-
      (github.event.label.name == 'signup-request' ||
       github.event.label.name == 'signup-approved' ||
       github.event.label.name == 'signup-rejected') &&
      !contains(github.event.issue.labels.*.name, 'signup-processed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Process signup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_AUTHOR_ID: ${{ github.event.issue.user.id }}
          ISSUE_SENDER: ${{ github.event.sender.login }}
          ISSUE_SENDER_ID: ${{ github.event.sender.id }}
          TRIGGER_LABEL: ${{ github.event.label.name }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
        run: python scripts/vllm/process_signup.py
