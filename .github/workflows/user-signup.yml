name: Process user signup

# Triggered when a dashboard visitor opens a "signup: <login>" issue via the
# entry-gate on docs/index.html. The issue body is an audit record carrying
# {email, requested_at}. Identity (github_id + login) is pulled from
# github.event.issue.user — authoritative and unspoofable.
#
# Responsibilities: parse + validate the JSON block, verify the issue was
# labeled by the author (anti-drive-by), append an entry to data/users.json
# on main via the Contents API, label + comment on the issue, optional
# email via Resend. The issue is intentionally NOT auto-closed — the admin
# keeps it open as an audit record and closes it manually.
#
# Trigger: ``labeled`` only. Creating an issue with a label fires both
# ``opened`` and ``labeled`` (GitHub delivers both for each label), which
# previously ran this handler twice per signup. Narrowing to ``labeled``
# plus filtering on ``label.name == signup-request`` gives exactly one run.
# The ``signup-processed`` guard prevents re-processing if a human re-adds
# the signup-request label after the script already handled it.
on:
  issues:
    types: [labeled]

concurrency:
  group: user-signup-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: write

jobs:
  process:
    if: >-
      github.event.label.name == 'signup-request' &&
      !contains(github.event.issue.labels.*.name, 'signup-processed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Process signup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_AUTHOR_ID: ${{ github.event.issue.user.id }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
        run: python scripts/vllm/process_signup.py
