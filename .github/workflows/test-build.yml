name: Register Test Build

# Triggered by the dashboard's "Test Build" tab after the browser has already
# created a build on Buildkite using the *user's* Buildkite token. The workflow
# never touches BUILDKITE_TOKEN — it only appends to
# data/vllm/ci/test_builds/index.json so the collector can later poll results.
#
# This keeps the admin's BUILDKITE_TOKEN out of any per-user write path:
# non-admin users spend their own Buildkite quota and carry their own audit
# trail.
on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Buildkite build number (already created by the browser)'
        required: true
        type: string
      web_url:
        description: 'Buildkite build web URL'
        required: true
        type: string
      commit:
        description: 'Resolved commit SHA'
        required: true
        type: string
      message:
        description: 'Build message / description'
        required: true
        type: string
      branch:
        description: 'Branch name on the target repo'
        required: true
        type: string
      env_vars:
        description: 'Newline-separated KEY=value pairs'
        required: false
        default: ''
        type: string
      clean_checkout:
        description: 'Force a fresh checkout on the agent'
        required: false
        default: false
        type: boolean
      fork_repo:
        description: 'owner/name of the repo holding the branch (empty = default vllm-project/vllm)'
        required: false
        default: ''
        type: string
      branch_ref:
        description: 'owner/name:branch label used when rendering the registry entry'
        required: false
        default: ''
        type: string
      base_image:
        description: 'Base image override (informational)'
        required: false
        default: ''
        type: string
      cleanup_mode:
        description: 'always | on_success | never'
        required: false
        default: 'never'
        type: string

concurrency:
  group: test-build-register
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Sync registry from gh-pages
        run: |
          mkdir -p data/vllm/ci/test_builds
          git fetch origin gh-pages --depth=1 || true
          LIVE=$(git show origin/gh-pages:data/vllm/ci/test_builds/index.json 2>/dev/null || true)
          if [ -n "$LIVE" ]; then
            echo "$LIVE" > data/vllm/ci/test_builds/index.json
          fi

      - name: Register test build
        env:
          TB_BUILD_NUMBER: ${{ inputs.build_number }}
          TB_WEB_URL: ${{ inputs.web_url }}
          TB_COMMIT: ${{ inputs.commit }}
          TB_MESSAGE: ${{ inputs.message }}
          TB_BRANCH: ${{ inputs.branch }}
          TB_ENV: ${{ inputs.env_vars }}
          TB_CLEAN: ${{ inputs.clean_checkout }}
          TB_FORK_REPO: ${{ inputs.fork_repo }}
          TB_BRANCH_REF: ${{ inputs.branch_ref }}
          TB_BASE_IMAGE: ${{ inputs.base_image }}
          TB_CLEANUP: ${{ inputs.cleanup_mode }}
          TB_REQUESTED_BY: ${{ github.actor }}
        run: python scripts/vllm/register_test_build.py

      - name: Commit registry update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vllm/ci/test_builds/
          if ! git diff --cached --quiet; then
            git commit -m "test-build: registered #${{ inputs.build_number }}"
            if git pull --rebase origin main; then
              git push || echo "::warning::Push to main failed"
            else
              git rebase --abort || true
              echo "::warning::Rebase against origin/main failed; registry commit remains local to the workflow"
            fi
          fi

      - name: Summary
        run: |
          echo "### Test build registered" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build: [#${{ inputs.build_number }}](${{ inputs.web_url }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- Requested by: @${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Message: ${{ inputs.message }}" >> "$GITHUB_STEP_SUMMARY"
