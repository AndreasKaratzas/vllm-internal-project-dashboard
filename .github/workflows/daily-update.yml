name: Data Collection

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours (midnight CST = 6am UTC, then every 2h)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Collect data
        run: python scripts/collect.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect test results
        run: python scripts/collect_tests.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect vLLM CI results (Buildkite)
        continue-on-error: true
        run: python scripts/collect_vllm_ci.py
        env:
          BUILDKITE_TOKEN: ${{ secrets.BUILDKITE_TOKEN }}

      - name: Collect activity metrics
        run: python scripts/collect_activity.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect build times
        run: python scripts/collect_build_times.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Take weekly snapshot
        run: python scripts/snapshot.py

      - name: Render dashboards
        run: python scripts/render.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dashboards/ docs/_data/ README.md
          git diff --staged --quiet || git commit -m "auto: update data $(date -u +%Y-%m-%dT%H:%M)"
          git push

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r docs/* _site/
          cp -r data/ _site/data/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: true
