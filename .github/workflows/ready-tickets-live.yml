name: Ready Tickets (live sync)

# Triple-daily live sync of nightly failing test groups with
# vllm-project/projects/39. The hourly-master workflow always runs
# sync_ready_tickets.py in dry-run so the dashboard preview stays fresh;
# this workflow is the ONLY place that actually creates/updates/closes
# issues on the board.
#
# The cron fires at 10:00, 12:00 (noon) and 18:00 America/Chicago.
# GitHub Actions crons are UTC — we pin to CDT offsets (UTC-5) since
# that's active most of the year. Expect a 1-hour earlier fire during
# CST (Nov–Mar). That drift doesn't matter for triage cadence.
#   10:00 CDT = 15:00 UTC
#   12:00 CDT = 17:00 UTC   (noon — interpreting "12 am" from the ask
#                            as noon; true midnight would produce a
#                            skewed 10a/midnight/6p schedule)
#   18:00 CDT = 23:00 UTC
on:
  schedule:
    - cron: '0 15 * * *'
    - cron: '0 17 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

concurrency:
  group: ready-tickets-live
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        # pyyaml required by sync_ready_tickets.py for reading the ready-test
        # YAML manifest; workflow failed until 2026-04-18 because only requests
        # was installed.
        run: pip install requests pyyaml

      - name: Sync Ready Tickets state from gh-pages
        run: |
          git fetch origin gh-pages --depth=1 || true
          for f in ready_tickets.json ready_tickets_state.json; do
            LIVE=$(git show origin/gh-pages:data/vllm/ci/$f 2>/dev/null || true)
            if [ -n "$LIVE" ]; then
              echo "$LIVE" > data/vllm/ci/$f
            fi
          done

      - name: Sync Ready Tickets with vllm-project/projects/39
        env:
          # Classic PAT with `project` + `repo` scope on vllm-project org.
          # GITHUB_TOKEN here cannot reach external Projects V2 boards;
          # this PAT is the *admin's own*, not any user-supplied token.
          PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          READY_TICKETS_LIVE: '1'
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python scripts/vllm/sync_ready_tickets.py

      - name: Commit + push state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vllm/ci/ready_tickets.json data/vllm/ci/ready_tickets_state.json
          if ! git diff --cached --quiet; then
            git commit -m "ready-tickets: live sync $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase origin main && git push || echo "::warning::push failed"
          fi

      - name: Summary
        run: |
          echo "### Ready Tickets live sync" >> "$GITHUB_STEP_SUMMARY"
          if [ -f data/vllm/ci/ready_tickets.json ]; then
            COUNT=$(python -c "import json; print(len(json.load(open('data/vllm/ci/ready_tickets.json')).get('tickets', [])))")
            echo "- Tickets in plan: $COUNT" >> "$GITHUB_STEP_SUMMARY"
          fi
